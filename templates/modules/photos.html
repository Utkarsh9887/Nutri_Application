<script>
/* ══════════════════════════════════════════════════════
   PHOTOS
══════════════════════════════════════════════════════ */
async function photos() {
  const c = document.getElementById('content');
  c.innerHTML = '<p>Loading…</p>';
  try {
    const list = await req('/media/photos/');
    renderPhotosPage(list);
  } catch(e) { c.innerHTML = `<div class="msg err">${e.message}</div>`; }
}

function renderPhotosPage(list) {
  const c = document.getElementById('content');
  c.innerHTML = `
    <h2>Progress Photos</h2>
    <div class="row" style="align-items:flex-start">

      <!-- Upload form -->
      <div style="flex:1;min-width:240px">
        <div class="card">
          <h3>Upload Photo</h3>
          <div style="margin-bottom:10px">
            <label>Photo</label>
            <input id="phFile" type="file" accept="image/jpeg,image/png,image/webp">
            <p style="font-size:11px;margin-top:4px">JPEG, PNG or WebP — max 5MB</p>
          </div>
          <div style="margin-bottom:10px">
            <label>Caption (optional)</label>
            <input id="phCaption" placeholder="e.g. Week 4 front">
          </div>
          <div style="margin-bottom:12px">
            <label>Date</label>
            <input id="phDate" type="date" value="${today()}">
          </div>

          <!-- Preview -->
          <div id="phPreview" style="display:none;margin-bottom:12px">
            <img id="phPreviewImg" style="width:100%;border-radius:8px;border:1px solid var(--border);max-height:200px;object-fit:cover">
          </div>

          <button class="primary" style="width:100%" onclick="uploadPhoto()">Upload</button>
          <div id="phMsg" style="margin-top:8px"></div>
        </div>
      </div>

      <!-- Photo grid -->
      <div style="flex:3;min-width:280px">
        <div class="card">
          <h3>My Photos (${list.length})</h3>
          ${list.length === 0
            ? '<p style="color:var(--text-muted);text-align:center;padding:32px 0">No photos yet. Upload your first progress photo!</p>'
            : `<div id="photoGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
                ${list.map(p => photoCard(p)).join('')}
               </div>`
          }
        </div>
      </div>

    </div>
  `;

  document.getElementById('phFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    document.getElementById('phPreviewImg').src = url;
    document.getElementById('phPreview').style.display = 'block';
  });
}

function photoCard(p) {
  return `
    <div style="position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg3)">
      <img src="${p.image_url}" alt="${p.caption || 'photo'}"
           style="width:100%;height:160px;object-fit:cover;display:block">
      <div style="padding:8px">
        <p style="font-size:12px;color:var(--text);font-weight:500;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">
          ${p.caption || '—'}
        </p>
        <p style="font-size:11px;color:var(--text-muted)">${p.date}</p>
      </div>
      <button class="danger small"
        style="position:absolute;top:6px;right:6px;padding:3px 8px;opacity:0.85"
        onclick="deletePhoto(${p.id})">✕</button>
    </div>`;
}

async function uploadPhoto() {
  const fileInput = document.getElementById('phFile');
  const file      = fileInput.files[0];
  const caption   = document.getElementById('phCaption').value.trim();
  const date      = document.getElementById('phDate').value;
  const msgEl     = document.getElementById('phMsg');

  if (!file) { msgEl.innerHTML = '<div class="msg err">Select a photo first.</div>'; return; }
  if (!date)  { msgEl.innerHTML = '<div class="msg err">Pick a date.</div>'; return; }

  if (file.size > 5 * 1024 * 1024) {
    msgEl.innerHTML = '<div class="msg err">File must be under 5MB.</div>'; return;
  }

  const btn = document.querySelector('#content button.primary');
  btn.disabled = true;
  btn.textContent = 'Uploading…';

  const form = new FormData();
  form.append('image',   file);
  form.append('caption', caption);
  form.append('date',    date);

  try {
    const headers = {};
    if (TOKEN) headers['Authorization'] = `Token ${TOKEN}`;
    const res = await fetch('/api/media/photos/upload/', { method: 'POST', headers, body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    toast('Photo uploaded!');
    await photos();
  } catch(e) {
    msgEl.innerHTML = `<div class="msg err">${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Upload';
  }
}

async function deletePhoto(id) {
  if (!confirm('Delete this photo? This cannot be undone.')) return;
  try {
    await req(`/media/photos/${id}/`, 'DELETE');
    toast('Photo deleted.');
    await photos();
  } catch(e) { toast(e.message, 'err'); }
}
</script>
