services:
  - type: web
    name: nutri-app
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_workouts"
    startCommand: "gunicorn nutri_backend.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: CORS_ALLOW_ALL_ORIGINS
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: nutri-db
          property: connectionString

databases:
  - name: nutri-db
    databaseName: nutri
    user: nutri